<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Quản Lý Đơn Hàng - Admin</title>
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <div class="sidebar">
        <div style="padding: 20px 0; text-align: center;">
            <img src="img/logo.png" alt="Logo" style="width: 50px; margin-bottom: 10px;">
            <div style="color: var(--primary); font-weight: bold; font-size: 18px;">La Pâtisserie</div>
        </div>
        <a href="dashboard.html">Dashboard</a>
        <a href="products.html">Sản Phẩm</a>
        <a href="categories.html">Danh Mục</a>
        <a href="orders.html">Đơn Hàng</a>
        <a href="../store-web/index.html">Xem Website</a>
    </div>

    <div class="admin-wrapper">
        <header class="admin-header">
            <h2></h2>
            <div style="display: flex; align-items: center; gap: 20px;">
                <a href="#" class="btn btn-danger" id="logout-btn" style="padding: 5px 15px; font-size: 13px;">Đăng
                    Xuất</a>
            </div>
        </header>
        <div class="main-content">
            <h1>Quản Lý Đơn Hàng</h1>
            <div style="margin-bottom: 20px;">
                <input type="text" id="order-search" placeholder="Tìm tên khách hoặc mã ĐH..."
                    style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Mã ĐH</th>
                        <th>Khách</th>
                        <th>Số ĐT</th>
                        <th>Tổng</th>
                        <th>Trạng thái</th>
                        <th>Tuỳ chỉnh</th>
                    </tr>
                </thead>
                <tbody id="orders-tbody"><!-- Loaded via JS --></tbody>
            </table>
        </div>
    </div>

    <!-- Order Details Modal -->
    <div id="order-modal" class="modal"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 3000;">
        <div style="background: white; padding: 30px; border-radius: 10px; width: 600px; max-height: 80vh; overflow-y: auto;">
            <h2>Chi Tiết Đơn Hàng <span id="modal-order-id"></span></h2>
            <div id="modal-order-info" style="margin-bottom: 20px;"></div>
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="border-bottom: 1px solid #ddd;">
                        <th style="padding: 10px 5px; text-align: left;">Sản phẩm</th>
                        <th style="padding: 10px 5px; text-align: center;">SL</th>
                        <th style="padding: 10px 5px; text-align: right;">Đơn giá</th>
                        <th style="padding: 10px 5px; text-align: right;">Thành tiền</th>
                    </tr>
                </thead>
                <tbody id="modal-order-tbody"></tbody>
            </table>
            <div style="text-align: right; margin-top: 20px; font-weight: bold; font-size: 1.2rem;">
                Tổng cộng: <span id="modal-order-total"></span>
            </div>
            <div style="display: flex; justify-content: flex-end; margin-top: 20px;">
                <button type="button" class="btn" onclick="closeModal()">Đóng</button>
            </div>
        </div>
    </div>

    <script src="js/admin-app.js"></script>
    <script>
        let allOrders = [];

        const renderOrders = (orders) => {
            const tbody = document.getElementById('orders-tbody');
            tbody.innerHTML = orders.map((o, index) => `
                <tr>
                    <td>#${o.id}</td>
                    <td>${o.customer_name}</td>
                    <td>${o.customer_phone}</td>
                    <td>${formatPrice(o.total_amount)}</td>
                    <td>
                        <select onchange="updateStatus(${o.id}, this.value)">
                            <option value="pending" ${o.status === 'pending' ? 'selected' : ''}>Chờ xử lý</option>
                            <option value="processing" ${o.status === 'processing' ? 'selected' : ''}>Đang làm</option>
                            <option value="shipped" ${o.status === 'shipped' ? 'selected' : ''}>Đang giao</option>
                            <option value="completed" ${o.status === 'completed' ? 'selected' : ''}>Hoàn thành</option>
                            <option value="cancelled" ${o.status === 'cancelled' ? 'selected' : ''}>Hủy</option>
                        </select>
                    </td>
                    <td><button class="btn" style="background: #e0e0e0;" onclick="showOrderDetails(${index})">Chi tiết</button></td>
                </tr>
            `).join('');
        };

        const loadOrders = async () => {
            const res = await adminFetch('/admin/orders');
            allOrders = res;
            renderOrders(allOrders);
        };

        const showOrderDetails = (index) => {
            const o = allOrders[index];
            document.getElementById('modal-order-id').innerText = '#' + o.id;
            document.getElementById('modal-order-total').innerText = formatPrice(o.total_amount);
            
            document.getElementById('modal-order-info').innerHTML = `
                <p><strong>Khách hàng:</strong> ${o.customer_name}</p>
                <p><strong>Số điện thoại:</strong> ${o.customer_phone}</p>
                <p><strong>Địa chỉ:</strong> ${o.customer_address}</p>
                <p><strong>Ngày đặt:</strong> ${new Date(o.created_at).toLocaleString()}</p>
            `;

            const tbody = document.getElementById('modal-order-tbody');
            tbody.innerHTML = o.items.map(item => `
                <tr style="border-bottom: 1px solid #eee;">
                    <td style="padding: 10px 5px;">${item.product_name}</td>
                    <td style="padding: 10px 5px; text-align: center;">${item.quantity}</td>
                    <td style="padding: 10px 5px; text-align: right;">${formatPrice(item.price)}</td>
                    <td style="padding: 10px 5px; text-align: right;">${formatPrice(item.price * item.quantity)}</td>
                </tr>
            `).join('');

            document.getElementById('order-modal').style.display = 'flex';
        };

        const closeModal = () => {
            document.getElementById('order-modal').style.display = 'none';
        };

        document.getElementById('order-search').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allOrders.filter(o =>
                o.customer_name.toLowerCase().includes(term) ||
                o.status.toLowerCase().includes(term) ||
                o.total_amount.toString().includes(term) ||
                o.id.toString().includes(term)
            );
            renderOrders(filtered);
        });

        const updateStatus = async (id, status) => {
            await adminFetch(`/admin/orders/${id}/status`, {
                method: 'PUT',
                body: JSON.stringify({ status })
            });
            alert('Đã cập nhật trạng thái!');
        };

        document.addEventListener('DOMContentLoaded', loadOrders);
    </script>
</body>

</html>
