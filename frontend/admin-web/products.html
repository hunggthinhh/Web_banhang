<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Quản Lý Sản Phẩm - Admin</title>
    <link rel="stylesheet" href="css/admin.css">
    <style>
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 500px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div style="padding: 20px 0; text-align: center;">
            <img src="img/logo.png" alt="Logo" style="width: 50px; margin-bottom: 10px;">
            <div style="color: var(--primary); font-weight: bold; font-size: 18px;">La Pâtisserie</div>
        </div>
        <a href="dashboard.html">Dashboard</a>
        <a href="products.html">Sản Phẩm</a>
        <a href="categories.html">Danh Mục</a>
        <a href="orders.html">Đơn Hàng</a>
        <a href="../store-web/index.html">Xem Website</a>
    </div>

    <div class="admin-wrapper">
        <header class="admin-header">
            <h2></h2>
            <div style="display: flex; align-items: center; gap: 20px;">
                <a href="#" class="btn btn-danger" id="logout-btn" style="padding: 5px 15px; font-size: 13px;">Đăng
                    Xuất</a>
            </div>
        </header>

        <div class="main-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1>Quản Lý Sản Phẩm</h1>
                <button class="btn btn-primary" id="add-product-btn">Thêm Sản Phẩm Mới</button>
            </div>

            <div style="display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px; margin-bottom: 30px;">
                <input type="text" id="filter-name" placeholder="Tìm tên bánh..." style="padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                <select id="filter-category" style="padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                    <option value="">Tất cả danh mục</option>
                    <option value="Bánh Kem">Bánh Kem</option>
                    <option value="Bánh Mì">Bánh Mì</option>
                    <option value="Bánh Ngọt">Bánh Ngọt</option>
                </select>
                <input type="number" id="filter-price" placeholder="Giá tối đa..." style="padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Hình</th>
                        <th>Tên</th>
                        <th>Danh mục</th>
                        <th>Giá</th>
                        <th>Tuỳ chỉnh</th>
                    </tr>
                </thead>
                <tbody id="products-tbody"><!-- Loaded via JS --></tbody>
            </table>
        </div>
    </div>

    <!-- Add Product Modal -->
    <div id="product-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Thêm Sản Phẩm</h2>
            <form id="product-form">
                <input type="hidden" id="product-id">
                <div class="form-group"><label>Tên</label><input type="text" id="name" required></div>
                <div class="form-group">
                    <label>Danh mục</label>
                    <select id="category_id" required>
                        <!-- Loaded via JS -->
                    </select>
                </div>
                <div class="form-group"><label>Giá</label><input type="number" id="price" required></div>
                <div class="form-group"><label>Mô tả</label><textarea id="description"></textarea></div>
                <div class="form-group"><label>Link Ảnh</label><input type="text" id="image"></div>
                <div style="display: flex; justify-content: flex-end; gap: 10px;">
                    <button type="button" class="btn" onclick="closeModal()">Hủy</button>
                    <button type="submit" class="btn btn-primary">Lưu lại</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/admin-app.js"></script>
    <script>
        let allProducts = [];

        const renderProducts = (products) => {
            const tbody = document.getElementById('products-tbody');
            tbody.innerHTML = products.map(p => `
                <tr>
                    <td><img src="${p.image}" width="50" style="border-radius: 5px;"></td>
                    <td>${p.name}</td>
                    <td>${p.category.name}</td>
                    <td>${formatPrice(p.price)}</td>
                    <td>
                        <button class="btn" style="background: #e0e0e0;" onclick="editProduct(${JSON.stringify(p).replace(/"/g, '&quot;')})">Sửa</button>
                        <button class="btn btn-danger" onclick="deleteProduct(${p.id})">Xóa</button>
                    </td>
                </tr>
            `).join('');
        };

        const loadProducts = async () => {
            allProducts = await adminFetch('/admin/products');
            renderProducts(allProducts);
        };

        const applyFilters = () => {
            const nameTerm = document.getElementById('filter-name').value.toLowerCase();
            const categoryTerm = document.getElementById('filter-category').value;
            const maxPrice = parseFloat(document.getElementById('filter-price').value) || Infinity;

            const filtered = allProducts.filter(p => {
                const matchName = p.name.toLowerCase().includes(nameTerm);
                const matchCategory = !categoryTerm || (p.category && p.category.name === categoryTerm);
                const matchPrice = p.price <= maxPrice;
                return matchName && matchCategory && matchPrice;
            });
            renderProducts(filtered);
        };

        document.getElementById('filter-name').addEventListener('input', applyFilters);
        document.getElementById('filter-category').addEventListener('change', applyFilters);
        document.getElementById('filter-price').addEventListener('input', applyFilters);

        const deleteProduct = async (id) => {
            if (confirm('Chắc chắn muốn xóa?')) {
                await adminFetch(`/admin/products/${id}`, { method: 'DELETE' });
                loadProducts();
            }
        };

        const editProduct = (p) => {
            document.getElementById('modal-title').innerText = 'Sửa Sản Phẩm';
            document.getElementById('product-id').value = p.id;
            document.getElementById('name').value = p.name;
            document.getElementById('category_id').value = p.category_id;
            document.getElementById('price').value = p.price;
            document.getElementById('description').value = p.description;
            document.getElementById('image').value = p.image;
            document.getElementById('product-modal').style.display = 'flex';
        };

        const closeModal = () => { document.getElementById('product-modal').style.display = 'none'; };

        document.getElementById('add-product-btn').addEventListener('click', () => {
            document.getElementById('product-form').reset();
            document.getElementById('product-id').value = '';
            document.getElementById('modal-title').innerText = 'Thêm Sản Phẩm';
            document.getElementById('product-modal').style.display = 'flex';
        });

        document.getElementById('product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('product-id').value;
            const data = {
                name: document.getElementById('name').value,
                category_id: document.getElementById('category_id').value,
                price: document.getElementById('price').value,
                description: document.getElementById('description').value,
                image: document.getElementById('image').value,
            };

            const method = id ? 'PUT' : 'POST';
            const endpoint = id ? `/admin/products/${id}` : '/admin/products';

            await adminFetch(endpoint, { method, body: JSON.stringify(data) });
            closeModal();
            loadProducts();
        });

        document.addEventListener('DOMContentLoaded', loadProducts);
    </script>
</body>

</html>
