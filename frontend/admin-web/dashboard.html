<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - La Pâtisserie</title>
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <div class="sidebar">
        <div style="padding: 20px 0; text-align: center;">
            <img src="img/logo.png" alt="Logo" style="width: 50px; margin-bottom: 10px;">
            <div style="color: var(--primary); font-weight: bold; font-size: 18px;">La Pâtisserie</div>
        </div>
        <a href="dashboard.html">Dashboard</a>
        <a href="products.html">Sản Phẩm</a>
        <a href="categories.html">Danh Mục</a>
        <a href="orders.html">Đơn Hàng</a>
        <a href="../store-web/index.html">Xem Website</a>
    </div>

    <div class="admin-wrapper">
        <header class="admin-header">
            <h2></h2>
            <div style="display: flex; align-items: center; gap: 20px;">
                <span style="font-size: 14px; color: #666;">Xin chào, <strong id="admin-name">Admin</strong></span>
                <a href="#" class="btn btn-danger" id="logout-btn" style="padding: 5px 15px; font-size: 13px;">Đăng
                    Xuất</a>
            </div>
        </header>

        <div class="main-content">
            <h1>Tổng Quan</h1>
            <div class="stats-cards">
                <div class="card">
                    <h3>Sản Phẩm</h3>
                    <p id="products-count">0</p>
                </div>
                <div class="card">
                    <h3>Đơn Hàng</h3>
                    <p id="orders-count">0</p>
                </div>
                <div class="card">
                    <h3>Khách Hàng</h3>
                    <p id="users-count">0</p>
                </div>
                <div class="card">
                    <h3>Doanh Thu</h3>
                    <p id="revenue">0 đ</p>
                </div>
            </div>

            <h3>Đơn Hàng Gần Đây</h3>
            <table id="recent-orders">
                <thead>
                    <tr>
                        <th>Mã ĐH</th>
                        <th>Khách</th>
                        <th>Tổng</th>
                        <th>Trạng thái</th>
                    </tr>
                </thead>
                <tbody><!-- Loaded via JS --></tbody>
            </table>
        </div>
    </div>

    <script src="js/admin-app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const data = await adminFetch('/admin/dashboard');
            if (data) {
                document.getElementById('products-count').innerText = data.productsCount;
                document.getElementById('orders-count').innerText = data.ordersCount;
                document.getElementById('users-count').innerText = data.usersCount;
                document.getElementById('revenue').innerText = formatPrice(data.revenue);

                const tbody = document.querySelector('#recent-orders tbody');
                tbody.innerHTML = data.recentOrders.map(o => `
                    <tr>
                        <td>#${o.id}</td>
                        <td>${o.customer_name}</td>
                        <td>${formatPrice(o.total_amount)}</td>
                        <td>${o.status}</td>
                    </tr>
                `).join('');
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.clear();
            window.location.href = '../store-web/login.html';
        });
    </script>
</body>

</html>
