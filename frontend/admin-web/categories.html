<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Quản Lý Danh Mục - Admin</title>
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <div class="sidebar">
        <div style="padding: 20px 0; text-align: center;">
            <img src="img/logo.png" alt="Logo" style="width: 50px; margin-bottom: 10px;">
            <div style="color: var(--primary); font-weight: bold; font-size: 18px;">La Pâtisserie</div>
        </div>
        <a href="dashboard.html">Dashboard</a>
        <a href="products.html">Sản Phẩm</a>
        <a href="categories.html">Danh Mục</a>
        <a href="orders.html">Đơn Hàng</a>
        <a href="../store-web/index.html">Xem Website</a>
    </div>

    <div class="admin-wrapper">
        <header class="admin-header">
            <h2>Admin Panel</h2>
            <div style="display: flex; align-items: center; gap: 20px;">
                <a href="#" class="btn btn-danger" id="logout-btn" style="padding: 5px 15px; font-size: 13px;">Đăng
                    Xuất</a>
            </div>
        </header>

        <div class="main-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1>Quản Lý Danh Mục</h1>
                <button class="btn btn-primary" id="add-category-btn">Thêm Danh Mục Mới</button>
            </div>

            <div style="margin-bottom: 30px;">
                <input type="text" id="category-search" placeholder="Tìm tên danh mục..."
                    style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Tên Danh Mục</th>
                        <th>Mô tả</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody id="categories-tbody"><!-- Loaded via JS --></tbody>
            </table>
        </div>
    </div>

    <!-- Modal -->
    <div id="category-modal"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 3000;">
        <div style="background: white; padding: 30px; border-radius: 10px; width: 400px;">
            <h2 id="modal-title">Thêm Danh Mục</h2>
            <form id="category-form">
                <input type="hidden" id="category-id">
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px;">Tên danh mục</label>
                    <input type="text" id="cat-name"
                        style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;" required>
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px;">Mô tả</label>
                    <textarea id="cat-desc"
                        style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;"></textarea>
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 10px;">
                    <button type="button" class="btn" onclick="closeModal()">Hủy</button>
                    <button type="submit" class="btn btn-primary">Lưu lại</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/admin-app.js"></script>
    <script>
        let allCategories = [];

        const renderCategories = (categories) => {
            const tbody = document.getElementById('categories-tbody');
            tbody.innerHTML = categories.map(c => `
                <tr>
                    <td>#${c.id}</td>
                    <td>${c.name}</td>
                    <td>${c.description || ''}</td>
                    <td>
                        <button class="btn" style="background: #e0e0e0;" onclick="editCategory(${JSON.stringify(c).replace(/"/g, '&quot;')})">Sửa</button>
                        <button class="btn btn-danger" onclick="deleteCategory(${c.id})">Xóa</button>
                    </td>
                </tr>
            `).join('');
        };

        const loadCategories = async () => {
            allCategories = await adminFetch('/categories'); // Sửa lại route tùy API
            renderCategories(allCategories);
        };

        const closeModal = () => { document.getElementById('category-modal').style.display = 'none'; };

        const editCategory = (c) => {
            document.getElementById('modal-title').innerText = 'Sửa Danh Mục';
            document.getElementById('category-id').value = c.id;
            document.getElementById('cat-name').value = c.name;
            document.getElementById('cat-desc').value = c.description || '';
            document.getElementById('category-modal').style.display = 'flex';
        };

        const deleteCategory = async (id) => {
            if (confirm('Chắc chắn muốn xóa danh mục này?')) {
                await adminFetch(`/admin/categories/${id}`, { method: 'DELETE' });
                loadCategories();
            }
        };

        document.getElementById('category-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('category-id').value;
            const data = {
                name: document.getElementById('cat-name').value,
                description: document.getElementById('cat-desc').value
            };
            const method = id ? 'PUT' : 'POST';
            const endpoint = id ? `/admin/categories/${id}` : '/admin/categories';
            
            await adminFetch(endpoint, { method, body: JSON.stringify(data) });
            closeModal();
            loadCategories();
        });

        document.getElementById('add-category-btn').addEventListener('click', () => {
            document.getElementById('category-form').reset();
            document.getElementById('category-id').value = '';
            document.getElementById('modal-title').innerText = 'Thêm Danh Mục';
            document.getElementById('category-modal').style.display = 'flex';
        });

        document.getElementById('category-search').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allCategories.filter(c => c.name.toLowerCase().includes(term));
            renderCategories(filtered);
        });

        document.addEventListener('DOMContentLoaded', loadCategories);
    </script>
</body>

</html>
