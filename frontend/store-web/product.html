<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi Tiết Bánh - La Pâtisserie</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container nav">
            <a href="index.html" class="logo">
                <img src="img/logo.png" alt="Logo">
                <span>La Pâtisserie</span>
            </a>
            <div class="nav-links">
                <a href="about.html">Giới thiệu</a>
                <a href="shop.html">Sản phẩm</a>
                <a href="policy.html">Chính sách</a>
                <a href="contact.html">Liên hệ</a>
                <a href="cart.html">Giỏ hàng (<span id="cart-count">0</span>)</a>
                <span id="auth-links">
                    <a href="login.html" id="login-link">Đăng nhập</a>
                    <a href="register.html">Đăng ký</a>
                </span>
            </div>
        </div>
    </header>

    <div class="container" style="margin-top: 50px;">
        <div id="product-detail" style="display: flex; gap: 40px; flex-wrap: wrap;">
            <!-- Loaded via JS -->
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');
            const data = await apiFetch(`/products/${slug}`);
            const p = data.product;
            
            document.getElementById('product-detail').innerHTML = `
                <div style="flex: 1; min-width: 300px;">
                    <img src="${p.image}" style="width: 100%; border-radius: 10px;">
                </div>
                <div style="flex: 1; min-width: 300px;">
                    <h1>${p.name}</h1>
                    <h2 style="color: var(--primary);">${formatPrice(p.price)}</h2>
                    <p>${p.description}</p>
                    <button class="btn" id="add-to-cart">Thêm Vào Giỏ Hàng</button>
                </div>
            `;

            document.getElementById('add-to-cart').addEventListener('click', () => {
                let cart = JSON.parse(localStorage.getItem('cart') || '[]');
                const existing = cart.find(item => item.id === p.id);
                if (existing) {
                    existing.quantity++;
                } else {
                    cart.push({ id: p.id, name: p.name, price: p.price, image: p.image, quantity: 1 });
                }
                localStorage.setItem('cart', JSON.stringify(cart));
                alert('Đã thêm vào giỏ hàng!');
                document.getElementById('cart-count').innerText = cart.length;
            });

            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            document.getElementById('cart-count').innerText = cart.length;
        });
    </script>
</body>
</html>
