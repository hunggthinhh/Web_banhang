<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giỏ Hàng - La Pâtisserie</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; border-bottom: 1px solid var(--border); text-align: left; }
    </style>
</head>
<body>
    <header>
        <div class="container nav">
            <a href="index.html" class="logo">
                <img src="img/logo.png" alt="Logo">
                <span>La Pâtisserie</span>
            </a>
            <div class="nav-links">
                <a href="index.html">Trang chủ</a>
                <a href="shop.html">Thực đơn</a>
                <a href="cart.html">Giỏ hàng (<span id="cart-count">0</span>)</a>
            </div>
        </div>
    </header>

    <div class="container">
        <h1 style="text-align: center; margin-top: 40px;">Giỏ Hàng Của Bạn</h1>
        <div id="cart-content">
            <!-- Loaded via JS -->
        </div>
        <div style="text-align: right; margin-top: 30px;">
            <p id="total-price" style="font-size: 20px; font-weight: bold;"></p>
            <a href="checkout.html" class="btn">Thanh Toán</a>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        const renderCart = () => {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const container = document.getElementById('cart-content');
            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align: center;">Giỏ hàng trống.</p>';
                document.getElementById('total-price').innerText = '';
                return;
            }
            let total = 0;
            let html = `<table><thead><tr><th>Sản phẩm</th><th>Giá</th><th>Số lượng</th><th>Tổng</th><th>Hành động</th></tr></thead><tbody>`;
            cart.forEach((item, index) => {
                const subtotal = item.price * item.quantity;
                total += subtotal;
                html += `
                    <tr>
                        <td>${item.name}</td>
                        <td>${formatPrice(item.price)}</td>
                        <td>${item.quantity}</td>
                        <td>${formatPrice(subtotal)}</td>
                        <td><button onclick="removeItem(${index})">Xóa</button></td>
                    </tr>
                `;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
            document.getElementById('total-price').innerText = 'Tổng cộng: ' + formatPrice(total);
            document.getElementById('cart-count').innerText = cart.length;
        };

        const removeItem = (index) => {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        };

        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>
</html>
