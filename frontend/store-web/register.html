<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Tài Khoản - La Pâtisserie</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
        }

        .auth-container {
            background: white;
            padding: 50px 40px;
            border-radius: 40px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 550px;
            text-align: center;
            margin: 60px auto;
            box-sizing: border-box;
        }

        .auth-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.4rem;
            color: #1a202c;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .auth-subtitle {
            color: #4a5568;
            font-size: 1.1rem;
            margin-bottom: 40px;
            font-weight: 400;
        }

        .auth-subtitle a {
            color: #ff5a5f;
            text-decoration: none;
            font-weight: 600;
        }

        .form-group {
            text-align: left;
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #2d3748;
            font-size: 1rem;
        }

        .form-group label span {
            color: #e53e3e;
        }

        .form-control {
            width: 100%;
            padding: 18px 20px;
            border: 2px solid #edf2f7;
            border-radius: 18px;
            font-size: 1rem;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
            box-sizing: border-box;
            color: #4a5568;
        }

        .form-control:focus {
            outline: none;
            border-color: #ffcc80;
            background-color: #fffaf0;
        }

        .form-control::placeholder {
            color: #a0aec0;
            font-weight: 300;
        }

        .password-field {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .btn-register {
            background-color: #ffda91;
            color: #1a202c;
            width: 100%;
            border: none;
            padding: 18px;
            border-radius: 18px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(255, 218, 145, 0.4);
        }

        .btn-register:hover {
            background-color: #fcc96b;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 218, 145, 0.6);
        }

        @media (max-width: 600px) {
            .auth-container {
                padding: 40px 25px;
                border-radius: 30px;
            }

            .auth-title {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="container nav">
            <a href="index.html" class="logo">
                <img src="img/logo.png" alt="Logo">
                <span>La Pâtisserie</span>
            </a>
            <div class="nav-links">
                <a href="about.html">Giới thiệu</a>
                <a href="shop.html">Sản phẩm</a>
                <a href="policy.html">Chính sách</a>
                <a href="contact.html">Liên hệ</a>
                <a href="cart.html">Giỏ hàng (<span id="cart-count">0</span>)</a>
                <span id="auth-links">
                    <a href="login.html" id="login-link" class="nav-btn">Đăng nhập</a>
                    <a href="register.html" class="nav-btn active">Đăng ký</a>
                </span>
            </div>
        </div>
    </header>

    <div class="auth-container">
        <h1 class="auth-title">Tạo tài khoản của bạn</h1>
        <p class="auth-subtitle">Bạn đã có tài khoản? <a href="login.html">Đăng nhập ngay</a></p>

        <form id="register-form">
            <div class="form-group">
                <label>Tên đăng nhập <span>*</span></label>
                <input type="text" id="username" class="form-control" placeholder="Nhập tên đăng nhập" required>
            </div>

            <div class="form-group">
                <label>Email <span>*</span></label>
                <input type="email" id="email" class="form-control" placeholder="Nhập email" required>
            </div>

            <div class="form-group">
                <label>Họ và tên <span>*</span></label>
                <input type="text" id="name" class="form-control" placeholder="Nhập họ và tên" required>
            </div>

            <div class="form-group">
                <label>Số điện thoại <span>*</span></label>
                <input type="tel" id="phone" class="form-control" placeholder="Nhập số điện thoại" required>
            </div>

            <div class="form-group">
                <label>Địa chỉ <span>*</span></label>
                <input type="text" id="address" class="form-control" placeholder="Nhập địa chỉ" required>
            </div>

            <div class="form-group">
                <label>Mật khẩu <span>*</span></label>
                <div class="password-field">
                    <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu" required>
                    <i class="fa-regular fa-eye password-toggle" id="togglePassword"></i>
                </div>
            </div>

            <button type="submit" class="btn-register">Đăng ký</button>
        </form>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Toggle password visibility
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#password');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
            this.classList.toggle('fa-eye');
        });

        // Form submission
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Đăng ký thành công!');
                    localStorage.setItem('auth_token', data.access_token);
                    localStorage.setItem('user_name', data.user.name);
                    window.location.href = 'index.html';
                } else {
                    let errorMsg = data.message || 'Đăng ký thất bại';
                    if (data.errors) {
                        errorMsg = Object.values(data.errors).flat().join('\n');
                    }
                    alert(errorMsg);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Có lỗi xảy ra, vui lòng thử lại sau.');
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const cartCountElement = document.getElementById('cart-count');
            if (cartCountElement) cartCountElement.innerText = cart.length;
        });
    </script>
</body>

</html>
