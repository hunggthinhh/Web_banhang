<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thực Đơn - La Pâtisserie</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container nav">
            <a href="index.html" class="logo">
                <img src="img/logo.png" alt="Logo">
                <span>La Pâtisserie</span>
            </a>
            <div class="nav-links">
                <a href="index.html">Trang chủ</a>
                <a href="shop.html">Thực đơn</a>
                <a href="cart.html">Giỏ hàng (<span id="cart-count">0</span>)</a>
            </div>
        </div>
    </header>

    <div class="container">
        <h1 style="text-align: center; margin-top: 40px;">Tất Cả Sản Phẩm</h1>
        <div id="products-list" class="products-grid">
            <!-- Loaded via JS -->
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const products = await apiFetch('/products');
            const grid = document.getElementById('products-list');
            grid.innerHTML = products.map(p => `
                <div class="product-card">
                    <img src="${p.image}" alt="${p.name}">
                    <h3>${p.name}</h3>
                    <p>${formatPrice(p.price)}</p>
                    <a href="product.html?slug=${p.slug}" class="btn">Xem chi tiết</a>
                </div>
            `).join('');
            
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            document.getElementById('cart-count').innerText = cart.length;
        });
    </script>
</body>
</html>
